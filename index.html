<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>FinTrack</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f;--bg2:#0e0e1a;--bg3:#141422;
  --card:rgba(255,255,255,0.025);--card-h:rgba(255,255,255,0.045);
  --brd:rgba(255,255,255,0.05);--brd2:rgba(255,255,255,0.1);
  --t1:#eeeef5;--t2:#8b8ba0;--t3:#4a4a5e;
  --ac:#7c5cfc;--ac2:#6343e0;--ac-g:linear-gradient(135deg,#7c5cfc,#4f8ffc);
  --g:#2dd881;--r:#f0475a;--o:#ff8a3d;--bl:#4f8ffc;
  --pu:#9d6df5;--pk:#f06;--tl:#2dd4bf;--yl:#fbbf24;--cy:#22d3ee;
  --glow:0 0 30px rgba(124,92,252,0.08);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;letter-spacing:0.01em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
.m{font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em}

/* Layout */
#app{display:flex;height:100vh}
#sb{width:210px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;padding:20px 0;transition:width .3s}
#mn{flex:1;overflow-y:auto;padding:28px 32px 52px;background:radial-gradient(ellipse at 30% 0%,rgba(124,92,252,0.03),transparent 60%)}

/* Logo */
.logo{display:flex;align-items:center;gap:11px;padding:0 18px;margin-bottom:30px}
.li{width:38px;height:38px;border-radius:12px;background:var(--ac-g);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0;box-shadow:0 4px 20px rgba(124,92,252,0.3)}

/* Nav */
.nv{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
.nv a{display:flex;align-items:center;gap:11px;padding:9px 14px;border-radius:10px;text-decoration:none;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nv a:hover{background:rgba(124,92,252,0.06);color:var(--t2);transform:translateX(2px)}
.nv a.on{background:rgba(124,92,252,0.1);color:var(--ac);font-weight:600;box-shadow:inset 3px 0 0 var(--ac)}
.nv a svg{width:17px;height:17px;flex-shrink:0;opacity:.7}
.nv a.on svg{opacity:1}

/* Cards */
.cd{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;transition:all .2s}
.cd:hover{border-color:var(--brd2);box-shadow:var(--glow)}

/* KPI Grid */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}

/* Buttons */
.bt{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:9px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:0.01em}
.bp{background:var(--ac-g);color:#fff;box-shadow:0 2px 12px rgba(124,92,252,0.25)}.bp:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,92,252,0.35)}
.bg{background:rgba(124,92,252,0.06);border:1px solid rgba(124,92,252,0.15);color:var(--ac)}.bg:hover{background:rgba(124,92,252,0.1);border-color:rgba(124,92,252,0.3)}
.bs{padding:5px 10px;font-size:11px;border-radius:7px}
.bd{background:rgba(240,71,90,0.06);border:1px solid rgba(240,71,90,0.12);color:var(--r)}.bd:hover{background:rgba(240,71,90,0.1)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 10px;color:var(--t3);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--brd)}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .1s}
tr:hover td{background:rgba(124,92,252,0.03)}

/* Badges */
.ba{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;border:none;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:0.01em}
.ba:hover{filter:brightness(1.3);transform:scale(1.04)}
.ba i{width:5px;height:5px;border-radius:50%;display:inline-block}

/* Tags */
.tg{display:inline-block;padding:3px 8px;border-radius:6px;font-size:9.5px;font-weight:600;letter-spacing:0.02em}

/* Dropzone */
.dz{border:2px dashed rgba(124,92,252,0.2);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(124,92,252,0.01)}
.dz:hover,.dz.active{border-color:var(--ac);background:rgba(124,92,252,0.04);box-shadow:0 0 40px rgba(124,92,252,0.06)}

/* Inputs */
input,select{background:rgba(255,255,255,0.03);border:1px solid var(--brd);border-radius:9px;padding:8px 13px;font-size:12.5px;color:var(--t1);font-family:inherit;outline:none;transition:all .15s}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,92,252,0.1)}
input::placeholder{color:var(--t3)}
select option{background:var(--bg3)}
.ii{width:100%;margin-top:4px;background:rgba(255,255,255,0.02);font-size:12.5px}

/* Pages */
.pg{display:none}.pg.on{display:block}

/* Charts */
.cb{position:relative;height:230px}

/* Alerts */
.al{border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;font-size:12.5px;backdrop-filter:blur(10px)}
.al-s{background:rgba(45,216,129,0.06);border:1px solid rgba(45,216,129,0.12)}
.al-e{background:rgba(240,71,90,0.06);border:1px solid rgba(240,71,90,0.12)}

/* Month nav */
.mn{display:flex;align-items:center;gap:10px}
.mn button{width:30px;height:30px;border-radius:8px;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.mn button:hover{border-color:var(--ac);color:var(--ac);background:rgba(124,92,252,0.06)}
.mn span{font-size:14px;font-weight:600;min-width:130px;text-align:center}

/* Dropdown */
.dd{position:absolute;z-index:100;background:var(--bg3);border:1px solid var(--brd2);border-radius:12px;padding:5px;box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03);min-width:170px;max-height:300px;overflow-y:auto;backdrop-filter:blur(20px)}
.dd button{display:flex;align-items:center;gap:7px;width:100%;text-align:left;padding:6px 10px;border-radius:8px;border:none;font-size:11.5px;color:var(--t2);background:transparent;cursor:pointer;font-family:inherit;transition:all .1s}
.dd button:hover{background:rgba(124,92,252,0.08)}
.dd button.sl{background:rgba(124,92,252,0.12);color:var(--ac);font-weight:600}

/* Hidden tx */
.ht{opacity:.25;text-decoration:line-through}

/* Animations */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.an{animation:fi .3s ease forwards}

/* Mobile */
@media(max-width:768px){
  #sb{position:fixed;left:-220px;z-index:50;height:100vh;transition:left .3s}
  #sb.open{left:0;box-shadow:20px 0 60px rgba(0,0,0,0.5)}
  #mn{padding:20px 16px 40px}
  .kg{grid-template-columns:repeat(2,1fr)}
  .mob-menu{display:flex!important}
}
.mob-menu{display:none;position:fixed;top:16px;left:16px;z-index:40;width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--brd);align-items:center;justify-content:center;cursor:pointer;color:var(--t2)}
</style>
</head>
<body>
<div class="mob-menu" onclick="document.getElementById('sb').classList.toggle('open')">≡</div>
<div id="app">
<div id="sb">
<div class="logo"><div class="li">FT</div><div><div style="font-size:15px;font-weight:700;color:var(--t1)">FinTrack</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;font-weight:500">OSOBNÍ FINANCE</div></div></div>
<div class="nv" id="nv"></div>
<div style="padding:18px;border-top:1px solid var(--brd);margin-top:10px">
<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);margin-bottom:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--g);display:inline-block"></span>Moneta</div>
<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)"><span style="width:6px;height:6px;border-radius:50%;background:var(--bl);display:inline-block"></span>Raiffeisenbank</div>
</div>
</div>
<div id="mn">
<div id="pg-dash" class="pg on an"></div>
<div id="pg-year" class="pg"></div>
<div id="pg-tx" class="pg"></div>
<div id="pg-imp" class="pg"></div>
<div id="pg-inv" class="pg"></div>
<div id="pg-wealth" class="pg"></div>
<div id="pg-cat" class="pg"></div>
<div id="pg-bill" class="pg"></div>
</div>
</div>
<script>

// ═══ DB ═══
let db,R;
function odb(){return new Promise((s,j)=>{const r=indexedDB.open('FT4',1);r.onupgradeneeded=e=>{const d=e.target.result;const t=d.createObjectStore('tx',{keyPath:'id',autoIncrement:true});t.createIndex('hash','hash',{unique:true});t.createIndex('date','date');d.createObjectStore('imp',{keyPath:'id',autoIncrement:true});d.createObjectStore('inv',{keyPath:'id',autoIncrement:true});d.createObjectStore('st',{keyPath:'key'});d.createObjectStore('snap',{keyPath:'id',autoIncrement:true})};r.onsuccess=e=>{db=e.target.result;R=true;s()};r.onerror=e=>j(e.target.error);r.onblocked=()=>j(new Error('blocked'))})}
function da(s,d){return new Promise((r,j)=>{const q=db.transaction(s,'readwrite').objectStore(s).add(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dg(s){return new Promise((r,j)=>{const q=db.transaction(s,'readonly').objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dp(s,d){return new Promise((r,j)=>{const q=db.transaction(s,'readwrite').objectStore(s).put(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dd(s,id){return new Promise((r,j)=>{const q=db.transaction(s,'readwrite').objectStore(s).delete(id);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}
function dh(h){return new Promise(r=>{const q=db.transaction('tx','readonly').objectStore('tx').index('hash').get(h);q.onsuccess=()=>r(!!q.result);q.onerror=()=>r(false)})}
function gs(k){return new Promise(r=>{try{const q=db.transaction('st','readonly').objectStore('st').get(k);q.onsuccess=()=>r(q.result?.value??null);q.onerror=()=>r(null)}catch(e){r(null)}})}
function ss(k,v){return dp('st',{key:k,value:v})}

// ═══ CATEGORIES ═══
let CATS=[
// Skupina Jídlo
{id:1,n:'Potraviny',group:'Jídlo',i:'',c:'#f97316'},
{id:15,n:'Restaurace',group:'Jídlo',i:'',c:'#e85d04'},
// Doprava
{id:3,n:'MHD / PID',i:'',c:'#3b82f6'},
{id:16,n:'Auto',i:'',c:'#ef4444'},
// Předplatné
{id:5,n:'Předplatné',i:'',c:'#6366f1'},
// Skupina Zábava
{id:17,n:'Hospody & bary',group:'Zábava',i:'',c:'#fbbf24'},
{id:18,n:'Hudba & kultura',group:'Zábava',i:'',c:'#a78bfa'},
{id:19,n:'Hry & software',group:'Zábava',i:'',c:'#1d4ed8'},
{id:20,n:'Sport & outdoor',group:'Zábava',i:'',c:'#16a34a'},
// Skupina Nákupy
{id:21,n:'Oblečení',group:'Nákupy',i:'',c:'#14b8a6'},
{id:22,n:'Drogerie & kosmetika',group:'Nákupy',i:'',c:'#ec4899'},
{id:23,n:'Domácnost & nábytek',group:'Nákupy',i:'',c:'#f59e0b'},
{id:24,n:'Ostatní nákupy',group:'Nákupy',i:'',c:'#8b5cf6'},
// Speciální
{id:7,n:'Příjem',i:'',c:'#22c55e'},
{id:8,n:'Investice',i:'',c:'#0ea5e9'},
{id:10,n:'Zdraví',i:'',c:'#f43f5e'},
{id:11,n:'Ostatní',i:'',c:'#6b7280'},
{id:12,n:'Spoření',i:'',c:'#c4b5fd'},
{id:13,n:'Převod',i:'',c:'#475569'},
{id:14,n:'Vyrovnání',i:'',c:'#2dd4bf'},
];
const CATS_VER=2;
async function loadCats(){const ver=await gs('catsVer');if(ver===CATS_VER){const c=await gs('cats');if(c)CATS=c}else{await ss('cats',CATS);await ss('catsVer',CATS_VER)}}
async function saveCats(){await ss('cats',CATS);await ss('catsVer',CATS_VER)}

const DEF_RULES=[
// Potraviny (id:1)
...['albert','lidl','kaufland','billa','tesco','penny','rohlik','rohlík','kosik','košík','globus','makro','potraviny','delikomat','hot-shop','banh mi','lahudky'].map(p=>({p,c:1})),
// Restaurace (id:15)
...['wolt','bolt food','dáme jídlo','foodora','mcdonalds','mcdonald','starbucks','kfc','subway','pizza','restaura','bistro','bufet'].map(p=>({p,c:15})),
// MHD / PID (id:3)
...['české dráhy','ceske drahy','regiojet','flixbus','dpp','lítačka','litacka'].map(p=>({p,c:3})),
// Auto (id:16)
...['uber','liftago','shell','benzina','omv','parking'].map(p=>({p,c:16})),
// Předplatné (id:5)
...['netflix','spotify','youtube','apple.com','hbo','disney','openai','chatgpt','github','microsoft 365','adobe','icloud'].map(p=>({p,c:5})),
// Hospody & bary (id:17)
...['hospoda','pivnice','hostinec','pub ','cocktail bar','wine bar'].map(p=>({p,c:17})),
// Hudba & kultura (id:18)
...['cinema','kino','goout','ticketmaster','vstupenka','koncert','divadlo','galerie'].map(p=>({p,c:18})),
// Hry & software (id:19)
...['steam','playstation','xbox','app store','google play','nintendo'].map(p=>({p,c:19})),
// Sport & outdoor (id:20)
...['decathlon','fitness','max fitness','bazén','lezeck','sportisimo','hervis'].map(p=>({p,c:20})),
// Oblečení (id:21)
...['zalando','zara','h&m','vinted','bonprix','reserved','about you'].map(p=>({p,c:21})),
// Drogerie & kosmetika (id:22)
...['dm drogerie','rossmann','notino','sephora','douglas'].map(p=>({p,c:22})),
// Domácnost & nábytek (id:23)
...['ikea','baumax','hornbach','obi ','jysk'].map(p=>({p,c:23})),
// Ostatní nákupy (id:24)
...['alza','czc.cz','datart','mall.cz','amazon','manboxeo'].map(p=>({p,c:24})),
// Příjem (id:7)
...['mzda','výplata','vyplata','příjem','prijem','salary','bonus','cetin a.s'].map(p=>({p,c:7})),
// Investice (id:8)
...['portu','degiro','xtb','trading 212','coinbase','binance','anycoin','etoro'].map(p=>({p,c:8})),
// Zdraví (id:10)
...['lékárna','ordinace','zubn','nemocnice','klinika'].map(p=>({p,c:10})),
// Spoření (id:12)
...['spořicí','sporici','spoření','sporeni','spořák','sporak'].map(p=>({p,c:12})),
];
let RULES=[...DEF_RULES];
const RULES_VER=2;
async function loadRules(){const ver=await gs('rulesVer');if(ver===RULES_VER){const r=await gs('rules');if(r)RULES=r}else{RULES=[...DEF_RULES];await ss('rules',RULES);await ss('rulesVer',RULES_VER)}}
async function saveRules(){await ss('rules',RULES);await ss('rulesVer',RULES_VER)}
function N(s){return(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim()}
function catOf(d,cp,a){const t=N(d+' '+(cp||''));for(const r of RULES)if(t.includes(N(r.p)))return r.c;return a>0?7:11}
function gc(id){return CATS.find(c=>c.id===id)||CATS.find(c=>c.id===11)}
function gCatGroups(catData){const gm={};const ug=[];catData.forEach(c=>{if(c.group){if(!gm[c.group]){const fc=CATS.find(x=>x.group===c.group);gm[c.group]={n:c.group,total:0,subs:[],c:fc?.c||c.c,isGroup:true}}gm[c.group].total+=c.total;gm[c.group].subs.push(c)}else ug.push(c)});return[...Object.values(gm),...ug].sort((a,b)=>b.total-a.total)}
function catSelectHTML(){const groups={};const ug=[];CATS.forEach(c=>{if(c.group){if(!groups[c.group])groups[c.group]=[];groups[c.group].push(c)}else ug.push(c)});let h='<option value="">Kategorie</option>';Object.entries(groups).forEach(([g,cs])=>{h+=`<optgroup label="${g}">${cs.map(c=>`<option value="${c.id}">${c.n}</option>`).join('')}</optgroup>`});ug.forEach(c=>{h+=`<option value="${c.id}">${c.n}</option>`});return h}
function isE(t){return t.amount<0&&t.categoryId!==12&&t.categoryId!==8&&t.categoryId!==13&&t.categoryId!==14&&!t.hidden}
function isInc(t){return t.amount>0&&t.categoryId!==12&&t.categoryId!==13&&t.categoryId!==14&&!t.hidden}
function isVyr(t){return t.categoryId===14&&!t.hidden}

// ═══ CSV ═══
function pCSV(text,dl){const rw=[];let cu='',q=false;for(let i=0;i<text.length;i++){const c=text[i];if(c==='"'){q=!q;cu+=c;continue}if(c==='\r')continue;if(c==='\n'&&!q){if(cu.trim())rw.push(cu);cu='';continue}cu+=c}if(cu.trim())rw.push(cu);if(rw.length<2)return{h:[],r:[]};function sf(l){const f=[];let fd='',q2=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){if(q2&&l[i+1]==='"'){fd+='"';i++}else q2=!q2;continue}if(c===dl&&!q2){f.push(fd.trim());fd='';continue}fd+=c}f.push(fd.trim());return f}const h=sf(rw[0]).map(x=>x.replace(/^﻿/,''));const res=[];for(let i=1;i<rw.length;i++){const v=sf(rw[i]);const row={};h.forEach((hd,j)=>{row[hd]=v[j]||''});res.push(row)}return{h,r:res}}
function dDl(t){const f=t.split('\n').slice(0,3).join('\n');return(f.match(/;/g)||[]).length>=(f.match(/,/g)||[]).length?';':','}
function pN(s){if(!s)return 0;return parseFloat(s.replace(/\s/g,'').replace(/\./g,'').replace(',','.'))||0}
function pD(s){if(!s)return null;s=s.trim();let m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return s;return null}
function fC(h,cs){for(const c of cs){const f=h.find(x=>N(x)===N(c));if(f)return f}return null}
function hT(b,d,a,ds,cp){const s=[b,d,a.toFixed(2),N(ds),N(cp||'')].join('|');let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return'h'+Math.abs(h).toString(36)}

async function doImp(text,bank,fname){
const dl=dDl(text);const{h,r}=pCSV(text,dl);if(!r.length)throw new Error('Prázdný soubor');
const dC=fC(h,['Datum provedení','Odesláno','Splatnost','Datum','Datum zaúčtování']);
const aC=fC(h,['Zaúčtovaná částka','Částka','Castka']);
if(!dC||!aC)throw new Error('Sloupce nenalezeny: '+h.join(', '));
const dsC=['Zpráva','Poznámka','Popis platby','Popis platby 2','Popis platby 3','Zpráva pro příjemce','Poznámka pro mě','Typ transakce','Kategorie transakce'].map(c=>fC(h,[c])).filter(Boolean);
const cpC=['Název obchodníka','Název protiúčtu','Název účtu příjemce'].map(c=>fC(h,[c])).filter(Boolean);
const rC=fC(h,['Id transakce','ID transakce','Bankovní reference']);
// Raw account number columns for transfer detection
const acctC=fC(h,['Číslo protiúčtu','Protiúčet']);
const bankCodeC=fC(h,['Banka protiúčtu']);
const ownAcctC=fC(h,['Číslo účtu']);
let ins=0,skip=0,err=0;const impId=Date.now();
for(const row of r){try{const dt=pD(row[dC]);const am=pN(row[aC]);if(!dt||am===0){err++;continue}
const ds=dsC.map(c=>row[c]?.trim()).filter(Boolean).join(' | ');const cp=cpC.map(c=>row[c]?.trim()).filter(Boolean)[0]||'';
const cpAcct=(acctC?row[acctC]?.trim():'')+(bankCodeC&&row[bankCodeC]?.trim()?'/'+row[bankCodeC].trim():'');
const hash=hT(bank,dt,am,ds,cp);if(await dh(hash)){skip++;continue}
let cid=catOf(ds,cp,am);
// Auto-detect transfers between own accounts
if(cid!==12&&cid!==7){
  const isTransfer=detectTransfer(bank,cpAcct,ds,cp);
  if(isTransfer)cid=13;
}
await da('tx',{date:dt,amount:am,description:ds,counterparty:cp,cpAcct,bankRef:rC?row[rC]?.trim():'',bankName:bank,hash,categoryId:cid,autoCategory:true,hidden:false,impId});
ins++}catch(e){err++}}
await da('imp',{bankName:bank,filename:fname,date:new Date().toISOString(),parsed:r.length,inserted:ins,skipped:skip,errors:err,impId});
// Post-import: detect matching transfer pairs
await detectTransferPairs();
return{parsed:r.length,inserted:ins,skipped:skip}}

// Detect if a single transaction is likely a transfer between own accounts
function detectTransfer(bank,cpAcct,desc,cp){
const d=N(desc+' '+cp);
// Moneta (0600) sending to Raiffeisen (5500) or vice versa
if(bank==='Moneta Money Bank'&&cpAcct.includes('/5500'))return true;
if(bank==='Moneta Money Bank'&&cpAcct.includes('5500'))return true;
if(bank==='Raiffeisenbank'&&cpAcct.includes('/0600'))return true;
if(bank==='Raiffeisenbank'&&cpAcct.includes('0600'))return true;
// Common transfer descriptions
if(d.includes('vlastni prevod'))return true;
if(d.includes('prevod mezi ucty'))return true;
if(d.includes('prevod mezi'))return true;
// Raiffeisen internal: look for own name patterns
if(d.includes('sykor')&&(d.includes('prevod')||d.includes('prikaz')))return true;
return false;
}

// After import: find matching pairs (same date, opposite amounts, different banks) and mark both as transfers
async function detectTransferPairs(){
const tx=await dg('tx');
const byDate={};
tx.forEach(t=>{if(!t.date)return;if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t)});
let marked=0;
for(const[date,dayTx]of Object.entries(byDate)){
  if(dayTx.length<2)continue;
  for(let i=0;i<dayTx.length;i++){
    for(let j=i+1;j<dayTx.length;j++){
      const a=dayTx[i],b=dayTx[j];
      // Same amount, opposite sign, different banks
      if(a.bankName!==b.bankName&&Math.abs(a.amount+b.amount)<1&&a.categoryId!==13&&b.categoryId!==13){
        a.categoryId=13;a.autoCategory=true;await dp('tx',a);
        b.categoryId=13;b.autoCategory=true;await dp('tx',b);
        marked+=2;
      }
    }
  }
}
if(marked)console.log('Auto-detected',marked,'transfer transactions');
}

// Re-categorize all matching transactions (including manually set ones, since user is explicitly defining this keyword)

for(const t of tx){const txt=N(t.description+' '+t.counterparty);if(txt.includes(nw)&&t.categoryId!==catId){t.categoryId=catId;t.autoCategory=true;await dp('tx',t);changed++}}

for(const t of tx){if(!t.autoCategory)continue;const newCat=catOf(t.description||'',t.counterparty||'',t.amount);if(newCat!==t.categoryId){t.categoryId=newCat;await dp('tx',t);changed++}}

}

${totalOwed?`<div class="cd" style="text-align:center;padding:16px"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px">Celkem k vyúčtování</div><div style="font-size:32px;font-weight:700;color:var(--o)">${F(totalOwed)} Kč</div></div>`:''}
${Object.entries(byP).map(([name,data])=>`<div class="cd">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h2 style="font-size:14px;font-weight:600">${name}</h2><div style="display:flex;gap:8px"><span class="tg" style="background:rgba(247,146,26,.1);color:var(--o)">Dluží: ${F(data.totalOwed)} Kč</span>${data.totalPaid?'<span class="tg" style="background:rgba(34,197,94,.1);color:var(--g)">Zaplaceno: '+F(data.totalPaid)+' Kč</span>':''}</div></div>
${data.bills.map(b=>`<div style="border:1px solid var(--brd);border-radius:10px;padding:10px 12px;margin-bottom:8px;${b.paid?'opacity:.4':''}">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
<span style="font-size:11px;color:var(--t3)">${new Date(b.date).toLocaleDateString('cs-CZ',{day:'numeric',month:'short',year:'numeric'})}</span>
<div style="display:flex;gap:6px;align-items:center"><span class="m" style="font-size:13px;font-weight:700;color:${b.paid?'var(--g)':'var(--o)'}">${F(b.total)} Kč</span>
<button class="bt ${b.paid?'bg':'bp'} bs" onclick="toggleBillPaid(${b.id},${!b.paid})">${b.paid?'Označit nezaplaceno':'Zaplaceno'}</button>
<button style="background:none;border:none;cursor:pointer;color:var(--r);font-size:10px" onclick="delBill(${b.id})">×</button></div></div>
<table style="font-size:10.5px"><tbody>${(b.items||[]).map(x=>`<tr><td class="m" style="color:var(--t3);width:70px">${x.date}</td><td>${(x.desc||x.cp||'—').substring(0,35)}</td><td class="m" style="text-align:right;font-weight:500">${F(x.amount)} Kč</td></tr>`).join('')}</tbody></table>
</div>`).join('')}</div>`).join('')}
${!bills.length?'<div class="cd" style="text-align:center;padding:30px;color:var(--t3);font-size:12px"><p>Zatím žádná vyúčtování.</p><p style="margin-top:6px">Jděte do Transakcí → zaškrtněte položky → klikněte "Vyúčtovat"</p></div>':''}
<div class="cd"><h2 style="font-size:13px;font-weight:600;margin-bottom:8px">Osoby</h2><div style="display:flex;flex-wrap:wrap;gap:6px">${persons.map(p=>'<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--brd);font-size:11px">'+p+'<button style="background:none;border:none;cursor:pointer;color:var(--r);font-size:9px" onclick="rmPerson(\''+p.replace(/'/g,"\\'")+'\')">×</button></span>').join('')}<button class="bt bg bs" onclick="addPerson()">+ Osoba</button></div></div>`;
}
async function toggleBillPaid(id,paid){const imps=await dg('imp');const b=imps.find(x=>x.id===id);if(!b)return;b.paid=paid;await dp('imp',b);rBill()}
async function delBill(id){if(!confirm('Smazat?'))return;await dd('imp',id);rBill()}
async function addPerson(){const n=prompt('Jméno:');if(!n)return;const p=await gs('billPersons')||[];if(!p.includes(n)){p.push(n);await ss('billPersons',p)}rBill()}
async function rmPerson(name){if(!confirm('Smazat osobu '+name+'?'))return;let p=await gs('billPersons')||[];p=p.filter(x=>x!==name);await ss('billPersons',p);rBill()}

// ═══ INIT ═══
(async function(){try{await odb();await loadCats();await loadRules();await rDash()}catch(e){console.error(e);document.getElementById('pg-dash').innerHTML='<div class="al al-e">'+e.message+' — zkuste F5</div>'}})();
</script>
</body>
</html>
